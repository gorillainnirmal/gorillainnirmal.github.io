<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book the Gorilla Mascot</title>
    <style>
        :root {
            --primary: #111;
            --accent: #ffcc00;
            --whatsapp: #25D366;
            --instagram: #E1306C;
            --bg: #f4f4f4;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .booking-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: var(--primary);
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        .social-link {
            text-align: center;
            margin-bottom: 25px;
        }

        .social-link a {
            display: inline-flex;
            align-items: center;
            color: var(--instagram);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: opacity 0.2s;
        }

        .social-link a:hover {
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        input[type="text"],
        input[type="tel"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--whatsapp);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #20ba5a;
        }
    </style>
</head>
<body>

<div class="booking-container">
    <h2>Book the Gorilla Mascot 🦍</h2>
    
    <div class="social-link">
        <a href="https://www.instagram.com/Gorilla_in_nirmal" target="_blank">
            📸 Follow us on Instagram: @Gorilla_in_nirmal
        </a>
    </div>

    <form id="bookingForm">
        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" required placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label for="phone">Contact Number</label>
            <input type="tel" id="phone" required placeholder="Enter your phone number">
        </div>

        <div class="form-group">
            <label for="date">Event Date</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label for="address">Your Address</label>
            <input type="text" id="address" required placeholder="Your home/billing address">
        </div>

        <div class="form-group">
            <label for="venue">Event Venue</label>
            <textarea id="venue" required placeholder="Where should the gorilla costume arrive?"></textarea>
        </div>

        <button type="submit" class="submit-btn">
            Book via WhatsApp
        </button>
    </form>
</div>

<script>
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Get form values
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const date = document.getElementById('date').value;
        const address = document.getElementById('address').value;
        const venue = document.getElementById('venue').value;

        // Your WhatsApp details
        const whatsappNumber = "917997206501"; // Format: Country code + number (No + sign)

        // Construct the WhatsApp message text
        const message = `Hello! I would like to book the Gorilla Mascot.%0A%0A` +
                        `*Name:* ${encodeURIComponent(name)}%0A` +
                        `*Phone:* ${encodeURIComponent(phone)}%0A` +
                        `*Date:* ${encodeURIComponent(date)}%0A` +
                        `*Address:* ${encodeURIComponent(address)}%0A` +
                        `*Venue:* ${encodeURIComponent(venue)}`;

        // Open WhatsApp Link
        const whatsappURL = `https://wa.me/${whatsappNumber}?text=${message}`;
        window.open(whatsappURL, '_blank');
    });
</script>

</body>
</html>
