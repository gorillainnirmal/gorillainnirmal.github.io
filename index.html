<section id="booking">

    <h2>Book Your Shoot</h2>

    <p>
        Ready to create something amazing? Fill in your details and we'll contact you shortly to confirm your booking.
    </p>

    <form action="https://formsubmit.co/abdulrehan58106@gmail.com" method="POST">

        <input type="text" name="Name" placeholder="Your Name" required>

        <input type="tel" name="Phone" placeholder="Phone Number" required>

        <input type="email" name="Email" placeholder="Email Address" required>

        <select name="Service" required>
            <option value="">Select Service</option>
            <option>Photography</option>
            <option>Videography</option>
            <option>Drone Shoot</option>
            <option>Wedding</option>
            <option>Event Coverage</option>
            <option>Instagram Reel</option>
        </select>

        <input type="date" name="Booking Date" required>

        <textarea name="Message" rows="5" placeholder="Tell us about your project..."></textarea>

        <button type="submit">Book Now</button>

    </form>

</section>
