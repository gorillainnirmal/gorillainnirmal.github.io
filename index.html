<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book the Gorilla Mascot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="booking-container">
        <h2>🦍 Book the Gorilla Mascot! 🦍</h2>
        <p>Fill out the details below to check availability for your event.</p>
        
        <!-- Form configured to send entries to your email -->
        <form id="bookingForm" action="https://formsubmit.co/abdulrehan58106@gmail.com" method="POST">
            
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label>Event Address</label>
                <input type="text" id="address" name="address" placeholder="Where is the event?" required>
            </div>

            <div class="input-group">
                <label>Date of Event</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" placeholder="Enter your WhatsApp number" required>
            </div>

            <button type="submit">Book Now (Email & WhatsApp)</button>
        </form>
    </div>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            const name = document.getElementById('name').value;
            const address = document.getElementById('address').value;
            const date = document.getElementById('date').value;
            const mobile = document.getElementById('mobile').value;

            // Target number with your India country code (91)
            const myWhatsAppNumber = "917997206501"; 

            // Text message configuration for WhatsApp
            const message = `Hello! I want to book the Gorilla Mascot.%0A%0A` +
                            `*Name:* ${encodeURIComponent(name)}%0A` +
                            `*Address:* ${encodeURIComponent(address)}%0A` +
                            `*Date:* ${encodeURIComponent(date)}%0A` +
                            `*Client Mobile:* ${encodeURIComponent(mobile)}`;

            const whatsappURL = `https://wa.me/${myWhatsAppNumber}?text=${message}`;

            // Opens WhatsApp app/web view immediately on submission
            window.open(whatsappURL, '_blank');
        });
    </script>

</body>
</html>
